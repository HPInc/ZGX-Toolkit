  Password input overlay template - Generic password input overlay that can be reused across views.
  All text content and configuration is passed in dynamically.
-->

<template id="password-input-overlay-template">
    <div class="overlay-backdrop" id="password-input-overlay-backdrop">
        <div class="overlay-widget password-input-overlay-widget" id="password-input-overlay-widget">
            <div class="overlay-header">
                <i class="codicon overlay-icon password-input-icon" id="password-input-overlay-icon"></i>
                <h2 class="overlay-title" id="password-input-overlay-title"></h2>
            </div>
            
            <div class="overlay-content password-input-content">
                <div class="password-input-message" id="password-input-overlay-message"></div>
                
                <div class="password-input-field-container">
                    <label for="password-input-overlay-field" class="password-input-label" id="password-input-overlay-label"></label>
                    <input 
                        type="password" 
                        id="password-input-overlay-field" 
                        class="password-input-field"
                        placeholder=""
                        autocomplete="off"
                        spellcheck="false"
                    />
                    <div class="password-input-error" id="password-input-overlay-error" style="display: none;"></div>
                </div>
                
                <div class="password-input-hint" id="password-input-overlay-hint"></div>
            </div>
            
            <div class="overlay-actions">
                <button class="overlay-btn overlay-btn-secondary" id="password-input-overlay-cancel-btn"></button>
                <button class="overlay-btn overlay-btn-primary" id="password-input-overlay-submit-btn"></button>
            </div>
        </div>
    </div>
</template>
