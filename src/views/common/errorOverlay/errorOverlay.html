  Error overlay template - The template is cloned and populated with error data at runtime.
  Uses base overlay classes with error-specific overrides.
-->

<template id="error-overlay-template">
    <div class="overlay-backdrop" id="error-overlay-backdrop">
        <div class="overlay-widget" id="error-overlay-widget">
            <div class="overlay-header">
                <i class="codicon codicon-warning overlay-icon error-overlay-icon"></i>
                <h2 class="overlay-title" id="error-overlay-title">Error</h2>
            </div>
            
            <div class="error-overlay-message-container">
                <svg class="error-overlay-message-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4.536 2L11.464 2L14.928 8L11.464 14L4.536 14L1.072 8L4.536 2Z" fill="currentColor"/>
                    <path d="M10.5 5.5L5.5 10.5M5.5 5.5l5 5" stroke="var(--vscode-editor-background)" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <div class="error-overlay-message" id="error-overlay-message"></div>
            </div>
            
            <div class="error-overlay-details" id="error-overlay-details">
                <div class="error-overlay-details-label">Error Details:</div>
                <div class="error-overlay-details-text" id="error-overlay-details-text"></div>
            </div>
            
            <div class="overlay-actions">
                <button class="overlay-btn overlay-btn-secondary" id="error-overlay-secondary-btn" style="display: none;">Secondary Action</button>
                <button class="overlay-btn overlay-btn-primary" id="error-overlay-close-btn">Return to Device Manager</button>
            </div>
        </div>
    </div>
</template>
